<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - ZATCA Invoice</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="/" class="logo">
          <div class="logo-icon">Z</div>
          <div class="logo-text">ZATCA <span>Invoice</span></div>
        </a>
        <h1 style="color: white; font-size: 1.5rem; margin: 1.5rem 0 0.5rem;">مرحباً بعودتك!</h1>
        <p style="color: rgba(255,255,255,0.8);">سجل دخولك للوصول إلى لوحة التحكم</p>
      </div>
      
      <div class="auth-body">
        <div id="errorMsg" class="alert alert-error" style="display: none;"></div>
        
        <form onsubmit="return handleLogin(event)">
          <div class="form-group">
            <label class="form-label">البريد الإلكتروني</label>
            <input type="email" id="email" class="form-input" placeholder="example@email.com" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">كلمة المرور</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required>
          </div>
          
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem;">
            <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.875rem; color: var(--color-text-secondary); cursor: pointer;">
              <input type="checkbox" id="remember" style="width: 18px; height: 18px; accent-color: var(--color-text-primary);">
              <span>تذكرني</span>
            </label>
            <a href="#" style="font-size: 0.875rem; color: var(--color-text-secondary); text-decoration: none;">نسيت كلمة المرور؟</a>
          </div>
          
          <button type="submit" id="submitBtn" class="btn btn-primary" style="width: 100%;">
            <span>تسجيل الدخول</span>
            <span>→</span>
          </button>
        </form>
      </div>
      
      <div class="auth-footer">
        <p>ليس لديك حساب؟ <a href="/register">سجل الآن</a></p>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
