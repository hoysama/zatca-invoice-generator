<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إنشاء حساب جديد - ZATCA Invoice</title>
  <link rel="stylesheet" href="/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="/" class="logo">
          <div class="logo-icon">Z</div>
          <div class="logo-text">ZATCA <span>Invoice</span></div>
        </a>
        <h1 style="color: white; font-size: 1.5rem; margin: 1.5rem 0 0.5rem;">إنشاء حساب جديد</h1>
        <p style="color: rgba(255,255,255,0.8);">ابدأ بإنشاء فواتيرك الضريبية مجاناً</p>
      </div>
      
      <div class="auth-body">
        <div id="errorMsg" class="alert alert-error" style="display: none;"></div>
        <div id="successMsg" class="alert alert-success" style="display: none;"></div>
        
        <form onsubmit="return handleRegister(event)">
          <div class="form-group">
            <label class="form-label">الاسم الكامل</label>
            <input type="text" id="name" class="form-input" placeholder="أدخل اسمك الكامل" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">البريد الإلكتروني</label>
            <input type="email" id="email" class="form-input" placeholder="example@email.com" required>
          </div>
          
          <div class="form-group">
            <label class="form-label">كلمة المرور</label>
            <input type="password" id="password" class="form-input" placeholder="••••••••" required minlength="8">
            <p class="form-hint">8 أحرف على الأقل</p>
          </div>
          
          <button type="submit" id="submitBtn" class="btn btn-primary" style="width: 100%;">
            <span>إنشاء الحساب</span>
            <span>→</span>
          </button>
        </form>
        
        <div style="text-align: center; margin: 1.5rem 0; color: var(--color-text-tertiary); font-size: 0.875rem;">أو</div>
        
        <button class="btn" style="width: 100%; background: var(--color-surface-strong); border: 1px solid var(--color-border-default);" onclick="alert('قريباً!')">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" style="margin-left: 0.5rem;">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span>التسجيل بـ Google</span>
        </button>
      </div>
      
      <div class="auth-footer">
        <p>لديك حساب بالفعل؟ <a href="/login">سجل دخول</a></p>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
